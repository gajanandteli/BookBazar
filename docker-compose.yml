version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: bookbazaar-postgres
    environment:
      POSTGRES_USER: bookbazaar
      POSTGRES_PASSWORD: bookbazaar
      POSTGRES_DB: bookbazaar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://bookbazaar:bookbazaar@postgres:5432/bookbazaar?schema=public
    depends_on:
      - postgres
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${process.env.NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
